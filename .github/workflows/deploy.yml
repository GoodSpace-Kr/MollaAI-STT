name: Deploy to EC2 (STT)

on:
  push:
    branches: [ "main" ]

env:
  DOCKERHUB_REPO: goodspace/molla-stt
  CONTAINER_NAME: molla-stt
  # 배포할 서버의 고정 IP 리스트를 여기에 적으세요 (여러 대라면 공백으로 구분)
  TARGET_IPS: "13.209.6.23" 

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    # 1. 도커 허브 로그인
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 2. 도커 이미지 빌드 및 푸시
    - name: Build and push
      run: |
        docker build -t ${{ env.DOCKERHUB_REPO }}:latest .
        docker push ${{ env.DOCKERHUB_REPO }}:latest

    # 3. 각 서버에 접속해서 배포
    - name: Deploy
      run: |
        printf "%s" "${{ secrets.EC2_SSH_KEY }}" > private_key.pem
        chmod 600 private_key.pem

        # 정해진 IP 리스트를 돌며 배포 진행
        for IP in ${{ env.TARGET_IPS }}; do
          echo "🚀 Deploying to $IP..."
          ssh -i private_key.pem -o StrictHostKeyChecking=no ubuntu@$IP "
            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }} && \
            docker stop ${{ env.CONTAINER_NAME }} || true && \
            docker rm ${{ env.CONTAINER_NAME }} || true && \
            docker pull ${{ env.DOCKERHUB_REPO }}:latest && \
            docker run --gpus all -d --name ${{ env.CONTAINER_NAME }} -p 8000:8000 ${{ env.DOCKERHUB_REPO }}:latest
          "
        done